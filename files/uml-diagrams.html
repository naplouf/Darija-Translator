<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>UML Diagrams – Darija Translator</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',sans-serif;background:#f4f6f8;color:#1a1a2e;padding:24px}
  h1{text-align:center;font-size:1.6rem;margin-bottom:4px}
  .subtitle{text-align:center;color:#888;font-size:.9rem;margin-bottom:28px}
  h2{font-size:1.1rem;color:#c1272d;margin:28px 0 10px;border-left:4px solid #c1272d;padding-left:10px}
  .diagram-box{background:white;border-radius:12px;box-shadow:0 2px 12px rgba(0,0,0,.08);padding:24px;margin-bottom:24px;overflow-x:auto}
  svg{display:block;margin:0 auto}
  /* UML class box */
  .cls rect{fill:#fff;stroke:#1a1a2e;stroke-width:1.5}
  .cls .hdr{fill:#1a1a2e}
  .cls .hdr-txt{fill:#fff;font-weight:700;font-size:13px;font-family:'Segoe UI',sans-serif}
  .cls .sect{fill:#f8f9fa}
  .cls text{font-size:11.5px;font-family:'Segoe UI',sans-serif;fill:#1a1a2e}
  .rel{stroke:#555;stroke-width:1.4;fill:none}
  .arr{fill:#555}
  .lbl{font-size:10px;fill:#555;font-family:'Segoe UI',sans-serif}
  /* interface stereotype */
  .iface .hdr{fill:#006233}
  /* deployment */
  .node rect{fill:#e8f4fd;stroke:#1a6fa8;stroke-width:1.5;rx:6}
  .node text{font-size:12px;font-family:'Segoe UI',sans-serif;fill:#1a1a2e}
  .node .ntitle{font-weight:700;font-size:13px}
  /* use case */
  .actor line,.actor ellipse{stroke:#1a1a2e;stroke-width:1.5;fill:none}
  .uc-box ellipse{fill:#fff8e1;stroke:#f0a500;stroke-width:1.5}
  .uc-box text{font-size:11px;font-family:'Segoe UI',sans-serif;text-anchor:middle;fill:#1a1a2e}
  .sys-box{fill:none;stroke:#006233;stroke-width:2;stroke-dasharray:6,3}
</style>
</head>
<body>
<h1>🇲🇦 Darija Translator — UML Diagrams</h1>
<p class="subtitle">Mini Project 2 · LLM-powered RESTful Web Service</p>

<!-- ══════════════════════════════════════════════════════════════════════════
     1. CLASS DIAGRAM
     ══════════════════════════════════════════════════════════════════════ -->
<h2>1 · Class Diagram</h2>
<div class="diagram-box">
<svg width="900" height="620" viewBox="0 0 900 620">

  <!-- ── TranslationService (interface) ── -->
  <g class="cls iface" transform="translate(340,20)">
    <rect width="220" height="72" rx="4"/>
    <rect class="hdr" width="220" height="30" rx="4"/>
    <rect class="hdr" width="220" height="26" y="4" rx="0"/>
    <text class="hdr-txt" x="110" y="13" text-anchor="middle">«interface»</text>
    <text class="hdr-txt" x="110" y="27" text-anchor="middle">TranslationService</text>
    <rect class="sect" x="1" y="30" width="218" height="41" rx="0"/>
    <text x="8" y="46">+ translate(text, lang): String</text>
    <text x="8" y="62">   throws TranslationException</text>
  </g>

  <!-- ── GeminiTranslationService ── -->
  <g class="cls" transform="translate(340,155)">
    <rect width="220" height="112" rx="4"/>
    <rect class="hdr" width="220" height="30" rx="4"/>
    <rect class="hdr" width="220" height="26" y="4" rx="0"/>
    <text class="hdr-txt" x="110" y="20" text-anchor="middle">GeminiTranslationService</text>
    <rect class="sect" x="1" y="30" width="218" height="36" rx="0"/>
    <text x="8" y="46">- API_KEY : String</text>
    <text x="8" y="62">- GEMINI_URL : String</text>
    <line x1="0" y1="66" x2="220" y2="66" stroke="#ccc"/>
    <text x="8" y="80">+ translate(text, lang): String</text>
    <text x="8" y="95">- buildPrompt(): String</text>
    <text x="8" y="110">- parseGeminiResponse(): String</text>
  </g>

  <!-- implements arrow (dashed + open triangle) -->
  <line class="rel" stroke-dasharray="6,3" x1="450" y1="92" x2="450" y2="155"/>
  <polygon class="arr" points="450,92 444,106 456,106" fill="none" stroke="#555" stroke-width="1.4"/>

  <!-- ── TranslatorResource ── -->
  <g class="cls" transform="translate(60,155)">
    <rect width="250" height="148" rx="4"/>
    <rect class="hdr" width="250" height="30" rx="4"/>
    <rect class="hdr" width="250" height="26" y="4" rx="0"/>
    <text class="hdr-txt" x="125" y="20" text-anchor="middle">TranslatorResource</text>
    <rect class="sect" x="1" y="30" width="248" height="36" rx="0"/>
    <text x="8" y="46">«@Path» /translator</text>
    <text x="8" y="62">- translationService : TranslationService</text>
    <line x1="0" y1="66" x2="250" y2="66" stroke="#ccc"/>
    <text x="8" y="80">+ health(): Response</text>
    <text x="8" y="95">+ translateGet(text,lang): Response</text>
    <text x="8" y="110">+ translatePost(req): Response</text>
    <text x="8" y="125">- performTranslation(...): Response</text>
    <text x="8" y="140">  «@GET,@POST,@RolesAllowed»</text>
  </g>

  <!-- uses arrow -->
  <line class="rel" x1="310" y1="211" x2="340" y2="211"/>
  <polygon class="arr" points="340,211 328,206 328,216" fill="#555"/>
  <text class="lbl" x="312" y="206">uses</text>

  <!-- ── TranslationRequest ── -->
  <g class="cls" transform="translate(60,370)">
    <rect width="220" height="112" rx="4"/>
    <rect class="hdr" width="220" height="30" rx="4"/>
    <rect class="hdr" width="220" height="26" y="4" rx="0"/>
    <text class="hdr-txt" x="110" y="20" text-anchor="middle">TranslationRequest</text>
    <rect class="sect" x="1" y="30" width="218" height="36" rx="0"/>
    <text x="8" y="46">- text : String</text>
    <text x="8" y="62">- sourceLanguage : String</text>
    <line x1="0" y1="66" x2="220" y2="66" stroke="#ccc"/>
    <text x="8" y="80">+ getText(): String</text>
    <text x="8" y="95">+ getSourceLanguage(): String</text>
    <text x="8" y="110">+ setText(v): void</text>
  </g>

  <!-- ── TranslationResponse ── -->
  <g class="cls" transform="translate(320,370)">
    <rect width="240" height="148" rx="4"/>
    <rect class="hdr" width="240" height="30" rx="4"/>
    <rect class="hdr" width="240" height="26" y="4" rx="0"/>
    <text class="hdr-txt" x="120" y="20" text-anchor="middle">TranslationResponse</text>
    <rect class="sect" x="1" y="30" width="238" height="56" rx="0"/>
    <text x="8" y="46">- originalText : String</text>
    <text x="8" y="62">- translatedText : String</text>
    <text x="8" y="78">- success : boolean</text>
    <text x="8" y="94">- errorMessage : String</text>
    <line x1="0" y1="87" x2="240" y2="87" stroke="#ccc"/>
    <text x="8" y="103">+ success(…): TranslationResponse «static»</text>
    <text x="8" y="118">+ error(msg): TranslationResponse «static»</text>
    <text x="8" y="133">+ getTranslatedText(): String</text>
  </g>

  <!-- ── TranslationException ── -->
  <g class="cls" transform="translate(610,370)">
    <rect width="220" height="88" rx="4"/>
    <rect class="hdr" width="220" height="30" rx="4"/>
    <rect class="hdr" width="220" height="26" y="4" rx="0"/>
    <text class="hdr-txt" x="110" y="20" text-anchor="middle">TranslationException</text>
    <rect class="sect" x="1" y="30" width="218" height="20" rx="0"/>
    <text x="8" y="44">extends Exception</text>
    <line x1="0" y1="50" x2="220" y2="50" stroke="#ccc"/>
    <text x="8" y="65">+ TranslationException(msg)</text>
    <text x="8" y="80">+ TranslationException(msg,cause)</text>
  </g>

  <!-- dependency arrows -->
  <line class="rel" stroke-dasharray="5,3" x1="185" y1="303" x2="185" y2="370"/>
  <polygon points="185,370 179,356 191,356" fill="none" stroke="#555" stroke-width="1.4"/>
  <text class="lbl" x="190" y="340">«uses»</text>

  <line class="rel" stroke-dasharray="5,3" x1="310" y1="303" x2="380" y2="370"/>
  <polygon points="380,370 372,357 384,357" fill="none" stroke="#555" stroke-width="1.4"/>

  <line class="rel" stroke-dasharray="5,3" x1="450" y1="267" x2="720" y2="370"/>
  <polygon points="720,370 712,357 724,357" fill="none" stroke="#555" stroke-width="1.4"/>
  <text class="lbl" x="590" y="330">«throws»</text>

  <!-- ── CorsFilter ── -->
  <g class="cls" transform="translate(610,155)">
    <rect width="200" height="88" rx="4"/>
    <rect class="hdr" width="200" height="30" rx="4"/>
    <rect class="hdr" width="200" height="26" y="4" rx="0"/>
    <text class="hdr-txt" x="100" y="20" text-anchor="middle">CorsFilter</text>
    <rect class="sect" x="1" y="30" width="198" height="20" rx="0"/>
    <text x="8" y="44">«@Provider»  implements ContainerResponseFilter</text>
    <line x1="0" y1="50" x2="200" y2="50" stroke="#ccc"/>
    <text x="8" y="65">+ filter(req, res): void</text>
  </g>

  <!-- TranslatorApplication -->
  <g class="cls" transform="translate(610,30)">
    <rect width="200" height="72" rx="4"/>
    <rect class="hdr" width="200" height="30" rx="4"/>
    <rect class="hdr" width="200" height="26" y="4" rx="0"/>
    <text class="hdr-txt" x="100" y="20" text-anchor="middle">TranslatorApplication</text>
    <rect class="sect" x="1" y="30" width="198" height="20" rx="0"/>
    <text x="8" y="44">«@ApplicationPath» /api</text>
    <line x1="0" y1="50" x2="200" y2="50" stroke="#ccc"/>
    <text x="8" y="65">extends Application</text>
  </g>
</svg>
</div>

<!-- ══════════════════════════════════════════════════════════════════════════
     2. DEPLOYMENT DIAGRAM
     ══════════════════════════════════════════════════════════════════════ -->
<h2>2 · Deployment Diagram</h2>
<div class="diagram-box">
<svg width="860" height="480" viewBox="0 0 860 480">
  <defs>
    <marker id="arrowD" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#555"/>
    </marker>
  </defs>

  <!-- ── Server Node ── -->
  <g class="node" transform="translate(280,30)">
    <rect width="300" height="380" rx="8" fill="#e8f4fd" stroke="#1a6fa8"/>
    <text class="ntitle" x="150" y="22" text-anchor="middle" font-family="Segoe UI" font-size="13" font-weight="700" fill="#1a6fa8">«node»</text>
    <text x="150" y="40" text-anchor="middle" font-family="Segoe UI" font-size="12" fill="#1a1a2e" font-weight="600">Application Server</text>
    <text x="150" y="56" text-anchor="middle" font-family="Segoe UI" font-size="10" fill="#888">(GlassFish / Payara)</text>

    <!-- WAR artifact -->
    <rect x="20" y="70" width="260" height="270" rx="6" fill="white" stroke="#aac4de"/>
    <text x="130" y="90" text-anchor="middle" font-family="Segoe UI" font-size="11" fill="#1a6fa8">«artifact»</text>
    <text x="130" y="106" text-anchor="middle" font-family="Segoe UI" font-size="12" font-weight="700" fill="#1a1a2e">darija-translator.war</text>

    <rect x="34" y="115" width="232" height="30" rx="4" fill="#f0f4ff" stroke="#c5d5f0"/>
    <text x="150" y="135" text-anchor="middle" font-family="Segoe UI" font-size="11" fill="#333">TranslatorApplication (@ApplicationPath)</text>

    <rect x="34" y="152" width="232" height="30" rx="4" fill="#f0f4ff" stroke="#c5d5f0"/>
    <text x="150" y="172" text-anchor="middle" font-family="Segoe UI" font-size="11" fill="#333">TranslatorResource (JAX-RS)</text>

    <rect x="34" y="189" width="232" height="30" rx="4" fill="#f0f4ff" stroke="#c5d5f0"/>
    <text x="150" y="209" text-anchor="middle" font-family="Segoe UI" font-size="11" fill="#333">GeminiTranslationService</text>

    <rect x="34" y="226" width="232" height="30" rx="4" fill="#fff8e1" stroke="#f0c060"/>
    <text x="150" y="246" text-anchor="middle" font-family="Segoe UI" font-size="11" fill="#333">Jakarta Basic Auth (web.xml)</text>

    <rect x="34" y="263" width="232" height="30" rx="4" fill="#f0f4ff" stroke="#c5d5f0"/>
    <text x="150" y="283" text-anchor="middle" font-family="Segoe UI" font-size="11" fill="#333">CorsFilter (@Provider)</text>

    <rect x="34" y="300" width="232" height="30" rx="4" fill="#ffeef0" stroke="#f0b0b5"/>
    <text x="150" y="320" text-anchor="middle" font-family="Segoe UI" font-size="11" fill="#333">Security Realm (File / JDBC)</text>
  </g>

  <!-- ── External LLM Node ── -->
  <g class="node" transform="translate(640,140)">
    <rect width="190" height="80" rx="8" fill="#e8fdf0" stroke="#006233"/>
    <text x="95" y="22" text-anchor="middle" font-family="Segoe UI" font-size="11" fill="#006233">«external service»</text>
    <text x="95" y="40" text-anchor="middle" font-family="Segoe UI" font-size="12" font-weight="700" fill="#1a1a2e">Google Gemini API</text>
    <text x="95" y="57" text-anchor="middle" font-family="Segoe UI" font-size="10" fill="#888">generativelanguage.googleapis.com</text>
    <text x="95" y="73" text-anchor="middle" font-family="Segoe UI" font-size="10" fill="#006233">HTTPS / REST</text>
  </g>

  <!-- arrow: server → Gemini -->
  <line x1="580" y1="200" x2="640" y2="190" stroke="#555" stroke-width="1.4" marker-end="url(#arrowD)"/>
  <text class="lbl" x="590" y="193" font-family="Segoe UI" font-size="10" fill="#555">HTTPS POST</text>

  <!-- ── Client Nodes ── -->
  <!-- Postman / cURL -->
  <g class="node" transform="translate(20,30)">
    <rect width="190" height="80" rx="8" fill="#f8f0fd" stroke="#8e44ad"/>
    <text x="95" y="20" text-anchor="middle" font-family="Segoe UI" font-size="11" fill="#8e44ad">«client»</text>
    <text x="95" y="36" text-anchor="middle" font-family="Segoe UI" font-size="12" font-weight="700">Postman / cURL</text>

    <text x="95" y="67" text-anchor="middle" font-family="Segoe UI" font-size="10" fill="#555">Basic Auth header</text>
  </g>
  <line x1="210" y1="70" x2="280" y2="130" stroke="#555" stroke-width="1.4" marker-end="url(#arrowD)" stroke-dasharray="4,2"/>

  <!-- Chrome Extension -->
  <g class="node" transform="translate(20,150)">
    <rect width="190" height="80" rx="8" fill="#fff3e0" stroke="#e67e22"/>
    <text x="95" y="20" text-anchor="middle" font-family="Segoe UI" font-size="11" fill="#e67e22">«client»</text>
    <text x="95" y="36" text-anchor="middle" font-family="Segoe UI" font-size="12" font-weight="700">Chrome Extension</text>
    <text x="95" y="52" text-anchor="middle" font-family="Segoe UI" font-size="10" fill="#888">Manifest V3 + Side Panel</text>
    <text x="95" y="67" text-anchor="middle" font-family="Segoe UI" font-size="10" fill="#555">fetch() + Basic Auth</text>
  </g>
  <line x1="210" y1="190" x2="280" y2="220" stroke="#555" stroke-width="1.4" marker-end="url(#arrowD)" stroke-dasharray="4,2"/>

  <!-- PHP Client -->
  <g class="node" transform="translate(20,270)">
    <rect width="190" height="80" rx="8" fill="#e3f2fd" stroke="#1976d2"/>
    <text x="95" y="20" text-anchor="middle" font-family="Segoe UI" font-size="11" fill="#1976d2">«client»</text>
    <text x="95" y="36" text-anchor="middle" font-family="Segoe UI" font-size="12" font-weight="700">PHP Web Client</text>
    <text x="95" y="52" text-anchor="middle" font-family="Segoe UI" font-size="10" fill="#888">Apache / PHP Server</text>
    <text x="95" y="67" text-anchor="middle" font-family="Segoe UI" font-size="10" fill="#555">cURL + Basic Auth</text>
  </g>
  <line x1="210" y1="310" x2="280" y2="300" stroke="#555" stroke-width="1.4" marker-end="url(#arrowD)" stroke-dasharray="4,2"/>

  <!-- Python Client -->
  <g class="node" transform="translate(20,390)">
    <rect width="190" height="70" rx="8" fill="#e8f5e9" stroke="#388e3c"/>
    <text x="95" y="20" text-anchor="middle" font-family="Segoe UI" font-size="11" fill="#388e3c">«client»</text>
    <text x="95" y="36" text-anchor="middle" font-family="Segoe UI" font-size="12" font-weight="700">Python Client</text>
    <text x="95" y="52" text-anchor="middle" font-family="Segoe UI" font-size="10" fill="#888">CLI + Tkinter GUI</text>
    <text x="95" y="67" text-anchor="middle" font-family="Segoe UI" font-size="10" fill="#555">urllib + Basic Auth</text>
  </g>
  <line x1="210" y1="418" x2="280" y2="370" stroke="#555" stroke-width="1.4" marker-end="url(#arrowD)" stroke-dasharray="4,2"/>

  <!-- React Native -->

    <rect width="190" height="80" rx="8" fill="#fce4ec" stroke="#c1272d"/>
    <text x="95" y="20" text-anchor="middle" font-family="Segoe UI" font-size="11" fill="#c1272d">«client»</text>
    <text x="95" y="36" text-anchor="middle" font-family="Segoe UI" font-size="12" font-weight="700">React Native App</text>
    <text x="95" y="52" text-anchor="middle" font-family="Segoe UI" font-size="10" fill="#888">iOS / Android</text>
    <text x="95" y="67" text-anchor="middle" font-family="Segoe UI" font-size="10" fill="#555">fetch() + Basic Auth</text>
  </g>
  <line x1="640" y1="320" x2="580" y2="300" stroke="#555" stroke-width="1.4" marker-end="url(#arrowD)" stroke-dasharray="4,2"/>

  <!-- Protocol label -->
  <text x="220" y="445" text-anchor="middle" font-family="Segoe UI" font-size="10" fill="#888">All clients communicate via HTTP/HTTPS JSON REST</text>
</svg>
</div>

<!-- ══════════════════════════════════════════════════════════════════════════
     3. USE CASE DIAGRAM
     ══════════════════════════════════════════════════════════════════════ -->
<h2>3 · Use Case Diagram</h2>
<div class="diagram-box">
<svg width="780" height="400" viewBox="0 0 780 400">

  <!-- System boundary -->
  <rect class="sys-box" x="160" y="30" width="460" height="340" rx="8"/>

  <!-- Use cases -->

  <ellipse class="uc-box" cx="310" cy="130" rx="90" ry="28"/>
  <text class="uc-box" x="310" y="134" text-anchor="middle" font-family="Segoe UI" font-size="11">Translate Text</text>

  <ellipse class="uc-box" cx="310" cy="210" rx="90" ry="28"/>

  <line x1="400" y1="130" x2="410" y2="130" stroke="#555" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arrowD)"/>
  <line x1="400" y1="130" x2="412" y2="130" stroke="#555" stroke-width="1.2" stroke-dasharray="5,3"/>
  <text x="406" y="122" text-anchor="middle" font-family="Segoe UI" font-size="9" fill="#555">«include»</text>

    <line x1="0"  y1="38" x2="40" y2="38" stroke="#1a1a2e" stroke-width="1.5"/>

  <!-- Admin actor -->
